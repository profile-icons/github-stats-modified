# modified by Adam Ross (https://www.github.com/profile-icons/git-stats); 26/05/26; refer: https://github.com/profile-icons/git-stats-old
name: Generate Stats Images

on:
  push:
    branches: 
      - main
    paths:
      - "src/**"
      - ".github/workflows/**"
      - "build.zig*"
  schedule:
    - cron: "0 0 * * 4"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: mlugg/setup-zig@v2
      with:
        version: 0.16.0

    - name: Build
      run: |
        zig build

    - name: Checkout history branch
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        # Push generated files to the generated branch
        git pull
        git checkout generated || git checkout -b generated

    - name: Generate images
      run: |
        ./zig-out/bin/github-stats
      env:
        ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        EXCLUDE_REPOS: ${{ secrets.EXCLUDE_REPOS }}
        EXCLUDE_LANGS: ${{ secrets.EXCLUDE_LANGS }}
        IS_LOCAL: ${{ secrets.IS_LOCAL }}
        EXCLUDE_PRIVATE: "false"
        SILENT: "true"
        # TODO: Remove this when they get their API working again
        # https://github.com/orgs/community/discussions/192970
        MAX_RETRIES: 5

    - name: Commit to the repo
      run: |
        git add .
        # Force the build to succeed, even if no files were changed
        git commit -m 'Update generated files' || true
        git push --set-upstream origin generated
